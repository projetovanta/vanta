sonar.projectKey=prevanta
sonar.projectName=VANTA
sonar.projectVersion=1.0.0

sonar.sources=components,features,hooks,modules,services,stores,types,utils
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json

sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  android/**,\
  ios/**,\
  public/**,\
  scripts/**,\
  memory/**,\
  audit-reports/**,\
  playwright-report/**,\
  test-results/**,\
  supabase/migrations/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/*.d.ts,\
  data/**

sonar.test.inclusions=\
  tests/**/*.test.ts,\
  tests/**/*.spec.ts

sonar.coverage.exclusions=\
  tests/**,\
  scripts/**,\
  **/*.config.*,\
  index.tsx,\
  instrument.ts

sonar.cpd.exclusions=\
  types/**

sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1854
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.tsx
