<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://www.googletagmanager.com https://va.vercel-scripts.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://unpkg.com https://i.imgur.com https://www.transparenttextures.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://fcm.googleapis.com https://fcmregistrations.googleapis.com https://firebaseinstallations.googleapis.com https://va.vercel-scripts.com https://vitals.vercel-insights.com https://viacep.com.br https://nominatim.openstreetmap.org https://*.ingest.sentry.io https://*.ingest.us.sentry.io; media-src 'self' blob:; worker-src 'self' blob:; frame-src 'none'; object-src 'none'; base-uri 'self';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>VANTA</title>
    <meta name="application-name" content="VANTA" />
    <meta name="description" content="Experiências exclusivas de noite premium." />
    <meta name="theme-color" content="#050505" />

    <!-- Open Graph -->
    <meta property="og:title" content="VANTA" />
    <meta property="og:description" content="Experiências exclusivas de noite premium." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://maisvanta.com" />
    <meta property="og:image" content="https://maisvanta.com/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VANTA" />
    <meta name="twitter:description" content="Experiências exclusivas de noite premium." />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VANTA" />

    <!-- Manifest e ícones -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!--
      Splash screens iOS — geradas para os modelos mais comuns.
      O iOS usa a que mais se aproxima da resolução do dispositivo.
      Como não temos imagens dedicadas, usamos o ícone como fallback.
      Para gerar splash screens reais: https://progressier.com/pwa-icons-and-ios-splash-screen-generator
    -->
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />

    <!-- Fontes — preload pra eliminar flash de fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display+SC:wght@700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display+SC:wght@700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS — defer pra não bloquear render (só usado no Radar) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" media="print" onload="this.media='all'" />

    <style>
      :root {
        --bg-midnight: #0A0A0A;
        --bg-void: #050505;
        --gold-canary: #FFD300;
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }

      * {
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-void);
        color: rgba(255, 255, 255, 0.92);
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* Impede bounce scroll no iOS quando em standalone */
      body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }

      #root {
        height: 100%;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .font-serif { font-family: 'Playfair Display SC', serif; }

      /* ── Tipografia responsiva — clamp global ────────────────── */
      .text-\[6px\]  { font-size: clamp(7px, 1.5vw, 8px) !important; }
      .text-\[7px\]  { font-size: clamp(8px, 1.8vw, 9px) !important; }
      .text-\[8px\]  { font-size: clamp(8px, 2vw, 10px) !important; }
      .text-\[9px\]  { font-size: clamp(9px, 2vw, 11px) !important; }
      .text-\[10px\] { font-size: clamp(10px, 2.2vw, 12px) !important; }
      .text-\[11px\] { font-size: clamp(11px, 2.5vw, 13px) !important; }
      .text-\[12px\] { font-size: clamp(12px, 2.5vw, 14px) !important; }
      .text-xs  { font-size: clamp(11px, 2.5vw, 12px) !important; }
      .text-sm  { font-size: clamp(12px, 2.8vw, 14px) !important; }
      .text-base { font-size: clamp(14px, 3vw, 16px) !important; }
      .text-lg  { font-size: clamp(16px, 3.2vw, 18px) !important; }
      .text-xl  { font-size: clamp(18px, 3.5vw, 20px) !important; }
      .text-2xl { font-size: clamp(20px, 4vw, 24px) !important; }
      .text-3xl { font-size: clamp(24px, 4.5vw, 30px) !important; }
      .text-4xl { font-size: clamp(28px, 5vw, 36px) !important; }
      .text-5xl { font-size: clamp(32px, 6vw, 48px) !important; }

      .glass-premium { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .bg-noise { background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png"); opacity: 0.03; }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-up { animation: fadeInUp 0.5s ease-out forwards; }
      .leaflet-container { background: #0A0A0A !important; }

      /* ── Safe Areas iOS PWA ──────────────────────────────────────────────── */
      /* safe-area-inset-top: aplicado UMA vez no container master (App.tsx).  */
      /* NENHUM componente filho deve usar env(safe-area-inset-top).           */

      /* Usar .safe-bottom em footers fixos. */
      .safe-bottom        { padding-bottom: env(safe-area-inset-bottom, 0px); }
      .safe-bottom.pb-4   { padding-bottom: calc(1rem    + env(safe-area-inset-bottom, 0px)); }
      .safe-bottom.pb-6   { padding-bottom: calc(1.5rem  + env(safe-area-inset-bottom, 0px)); }
    </style>
  </head>
  <body>
    <div class="fixed inset-0 bg-noise pointer-events-none"></div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
